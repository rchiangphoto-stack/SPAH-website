name: Generate Blog Header Images

on:
  push:
    branches: ['**']
    paths:
      - 'blog/*.html'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to generate images for'
        required: false
        default: 'claude/busy-goldberg-GY46m'

jobs:
  generate-headers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Find blog posts missing header images
        id: missing
        run: |
          SLUGS=""
          for html in blog/*.html; do
            img=$(grep -oP '(?<=src=")[^"]*-header\.webp' "$html" | head -1 || true)
            [ -z "$img" ] && continue
            img_path="${img#../}"
            slug=$(basename "$img_path" "-header.webp")
            if [ ! -f "$img_path" ]; then
              echo "Missing: $img_path (slug: $slug)"
              SLUGS="$SLUGS $slug"
            fi
          done
          SLUGS="${SLUGS# }"
          echo "slugs=$SLUGS" >> "$GITHUB_OUTPUT"

      - name: Generate missing header images
        if: steps.missing.outputs.slugs != ''
        env:
            UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          for slug in ${{ steps.missing.outputs.slugs }}; do
            echo "Generating: $slug"
            python3 scripts/auto_header.py "$slug"
          done

      - name: Commit and push generated images
        if: steps.missing.outputs.slugs != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/blog/
          git diff --cached --quiet && echo "No new images to commit" && exit 0
          git commit -m "Auto-generate blog header images [skip ci]"
          git push origin HEAD:${{ github.event.inputs.branch || github.ref_name }}
