name: Promote to Production and Purge Cache

on:
  push:
    branches: [master]

jobs:
  promote-and-purge:
    runs-on: ubuntu-latest
    steps:
      - name: Find matching Vercel deployment
        id: find
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_SLUG: ${{ vars.VERCEL_TEAM_SLUG || 'rchiangphoto-stacks-projects' }}
          VERCEL_PROJECT_NAME: ${{ vars.VERCEL_PROJECT_NAME || 'prj_6tfO2UX8ipImN44mArYe5j0DLW4i' }}
        run: |
          set -e
          TEAM_QS=""
          if [ -n "$VERCEL_TEAM_SLUG" ]; then TEAM_QS="&slug=$VERCEL_TEAM_SLUG"; fi

          echo "Waiting for deployment for commit $GITHUB_SHA..."
          for i in $(seq 1 30); do
            RESP=$(curl -s "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_NAME}&limit=10${TEAM_QS}" \
              -H "Authorization: Bearer $VERCEL_TOKEN")
            DEPLOYMENT_ID=$(echo "$RESP" | jq -r --arg sha "$GITHUB_SHA" \
              '.deployments[] | select(.meta.githubCommitSha == $sha) | .uid' | head -1)
            STATE=$(echo "$RESP" | jq -r --arg sha "$GITHUB_SHA" \
              '.deployments[] | select(.meta.githubCommitSha == $sha) | .readyState' | head -1)

            if [ -n "$DEPLOYMENT_ID" ] && [ "$STATE" = "READY" ]; then
              echo "Found ready deployment: $DEPLOYMENT_ID"
              echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $i: deployment not ready yet (state=$STATE). Waiting 20s..."
            sleep 20
          done
          echo "Timed out waiting for Vercel deployment to be ready."
          exit 1

      - name: Promote deployment to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_SLUG: ${{ vars.VERCEL_TEAM_SLUG || 'rchiangphoto-stacks-projects' }}
          VERCEL_PROJECT_NAME: ${{ vars.VERCEL_PROJECT_NAME || 'prj_6tfO2UX8ipImN44mArYe5j0DLW4i' }}
        run: |
          set -e
          TEAM_QS=""
          if [ -n "$VERCEL_TEAM_SLUG" ]; then TEAM_QS="?slug=$VERCEL_TEAM_SLUG"; fi

          HTTP_CODE=$(curl -s -o /tmp/promote_resp.json -w "%{http_code}" -X POST \
            "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_NAME}/promote/${{ steps.find.outputs.deployment_id }}${TEAM_QS}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json")

          if [ "$HTTP_CODE" -ge 400 ]; then
            if grep -q '"code":"conflict"' /tmp/promote_resp.json && grep -q "already the current production deployment" /tmp/promote_resp.json; then
              echo "Deployment ${{ steps.find.outputs.deployment_id }} is already the production deployment (Vercel Git integration auto-promoted it). Continuing."
            else
              echo "HTTP status: $HTTP_CODE"
              cat /tmp/promote_resp.json
              echo
              exit 1
            fi
          else
            echo "Promoted deployment ${{ steps.find.outputs.deployment_id }} to production."
          fi

      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          set -e
          HTTP_CODE=$(curl -s -o /tmp/purge_resp.json -w "%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "HTTP status: $HTTP_CODE"
          cat /tmp/purge_resp.json
          echo
          if [ "$HTTP_CODE" -ge 400 ]; then
            exit 1
          fi
          echo "Purged Cloudflare cache for spah.la."
