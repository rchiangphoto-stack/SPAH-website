name: Update Review Counts

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8am UTC (1am PST)
  workflow_dispatch: # Allow manual trigger

jobs:
  update-reviews:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Load existing values as fallback
        id: existing
        run: |
          EXISTING_GOOGLE_RATING=$(python3 -c "import json; d=json.load(open('reviews.json')); print(d['google']['rating'])")
          EXISTING_GOOGLE_COUNT=$(python3 -c "import json; d=json.load(open('reviews.json')); print(d['google']['count'])")
          EXISTING_YELP_RATING=$(python3 -c "import json; d=json.load(open('reviews.json')); print(d['yelp']['rating'])")
          EXISTING_YELP_COUNT=$(python3 -c "import json; d=json.load(open('reviews.json')); print(d['yelp']['count'])")
          echo "google_rating=$EXISTING_GOOGLE_RATING" >> $GITHUB_OUTPUT
          echo "google_count=$EXISTING_GOOGLE_COUNT" >> $GITHUB_OUTPUT
          echo "yelp_rating=$EXISTING_YELP_RATING" >> $GITHUB_OUTPUT
          echo "yelp_count=$EXISTING_YELP_COUNT" >> $GITHUB_OUTPUT

      - name: Fetch Google Reviews
        id: google
        run: |
          RESPONSE=$(curl -s --max-time 10 "https://maps.googleapis.com/maps/api/place/findplacefromtext/json?input=South+Pasadena+Animal+Hospital+Alhambra&inputtype=textquery&fields=place_id,rating,user_ratings_total&key=${{ secrets.GOOGLE_API_KEY }}")
          echo "Google API response: $RESPONSE"
          GOOGLE_RATING=$(echo "$RESPONSE" | jq -r '.candidates[0].rating // empty')
          GOOGLE_COUNT=$(echo "$RESPONSE" | jq -r '.candidates[0].user_ratings_total // empty')
          if [ -z "$GOOGLE_RATING" ] || [ -z "$GOOGLE_COUNT" ]; then
            echo "WARNING: Google API returned empty â€” using existing values"
            GOOGLE_RATING="${{ steps.existing.outputs.google_rating }}"
            GOOGLE_COUNT="${{ steps.existing.outputs.google_count }}"
          fi
          echo "rating=$GOOGLE_RATING" >> $GITHUB_OUTPUT
          echo "count=$GOOGLE_COUNT" >> $GITHUB_OUTPUT

      - name: Fetch Yelp Reviews
        id: yelp
        run: |
          RESPONSE=$(curl -s --max-time 10 "https://api.yelp.com/v3/businesses/south-pasadena-animal-hospital-alhambra" -H "Authorization: Bearer ${{ secrets.YELP_API_KEY }}")
          echo "Yelp API response: $RESPONSE"
          YELP_RATING=$(echo "$RESPONSE" | jq -r '.rating // empty')
          YELP_COUNT=$(echo "$RESPONSE" | jq -r '.review_count // empty')
          if [ -z "$YELP_RATING" ] || [ -z "$YELP_COUNT" ]; then
            echo "WARNING: Yelp API returned empty â€” using existing values"
            YELP_RATING="${{ steps.existing.outputs.yelp_rating }}"
            YELP_COUNT="${{ steps.existing.outputs.yelp_count }}"
          fi
          echo "rating=$YELP_RATING" >> $GITHUB_OUTPUT
          echo "count=$YELP_COUNT" >> $GITHUB_OUTPUT

      - name: Generate reviews.json
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess
          from datetime import datetime, timezone

          g_r = float("${{ steps.google.outputs.rating }}")
          g_c = int("${{ steps.google.outputs.count }}")
          y_r = float("${{ steps.yelp.outputs.rating }}")
          y_c = int("${{ steps.yelp.outputs.count }}")

          total = g_c + y_c
          combined = round((g_r * g_c + y_r * y_c) / total, 1) if total > 0 else 0.0

          data = {
              "google":   {"rating": g_r, "count": g_c},
              "yelp":     {"rating": y_r, "count": y_c},
              "combined": {"rating": combined, "count": total},
              "updated":  datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          }

          with open("reviews.json", "w") as f:
              json.dump(data, f, indent=4)

          print(json.dumps(data, indent=4))
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reviews.json
          git diff --cached --quiet && echo "No changes â€” reviews unchanged" && exit 0
          git commit -m "Update review counts [automated]"
          git pull --rebase origin master
          git push
